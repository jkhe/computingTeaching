<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L2 Dojo — Variables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #1e1b4b;
    --accent: #4338ca;
    --accent-h: #3730a3;
    --accent-light: #ede9fe;
    --bg: #f0f2ff;
    --text: #111827;
    --muted: #6b7280;
    --border: #d1d5db;
    --success: #15803d;
    --success-bg: #f0fdf4;
    --success-border: #86efac;
    --error: #b91c1c;
    --error-bg: #fef2f2;
    --error-border: #fca5a5;
    --hint-bg: #fffbeb;
    --hint-text: #78350f;
    --hint-border: #f59e0b;
    --code-bg: #1e293b;
    --code-text: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 18px; line-height: 1.7; }
header { background: var(--primary); color: white; padding: 28px 40px; }
.lesson-tag { font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #a5b4fc; margin-bottom: 8px; }
header h1 { font-size: 30px; font-weight: 800; }
main { flex: 1; padding: 40px; max-width: 860px; width: 100%; margin: 0 auto; }
.instruction { background: white; border: 2px solid var(--border); border-radius: 16px; padding: 24px 32px; margin-bottom: 32px; font-size: 20px; font-weight: 500; line-height: 1.6; }
.progress { display: flex; gap: 12px; align-items: center; margin-bottom: 28px; }
.dot { width: 16px; height: 16px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
.dot.done { background: var(--success); }
.dot.current { background: var(--accent); }
.question-label { font-size: 15px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-left: 6px; }
.snippet-label { font-size: 15px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.code-block { background: var(--code-bg); border-radius: 14px; padding: 8px 0; margin-bottom: 28px; overflow: hidden; }
.code-line {
    display: flex;
    align-items: center;
    padding: 10px 24px;
    gap: 16px;
    color: var(--code-text);
    font-family: 'Courier New', monospace;
    font-size: 18px;
    line-height: 1.6;
    transition: background 0.12s;
}
.code-line.clickable { cursor: pointer; }
.code-line.clickable:hover { background: #2d3f55; }
.code-line.clicked-wrong { background: #7f1d1d; color: #fecaca; cursor: default; }
.code-line.clicked-correct { background: #14532d; color: #bbf7d0; cursor: default; }
.line-num { color: #475569; font-size: 14px; min-width: 24px; text-align: right; user-select: none; font-family: 'Courier New', monospace; }
.line-content { white-space: pre; }
.click-label { font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: 20px; }
.feedback-box { border-radius: 14px; padding: 20px 24px; font-size: 18px; font-weight: 600; display: none; line-height: 1.5; margin-bottom: 20px; }
.feedback-correct { background: var(--success-bg); border: 2px solid var(--success-border); color: var(--success); }
.feedback-wrong { background: var(--error-bg); border: 2px solid var(--error-border); color: var(--error); }
.btn { display: inline-flex; align-items: center; padding: 16px 32px; border-radius: 12px; font-family: 'Lexend', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; border: 3px solid transparent; transition: background 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-next { background: var(--success); color: white; border-color: var(--success); display: none; }
.btn-next:hover { background: #166534; }
.btn-hint { background: var(--hint-bg); color: var(--hint-text); border-color: var(--hint-border); }
.hint-box { background: var(--hint-bg); border: 2px solid var(--hint-border); border-radius: 12px; padding: 20px 24px; color: var(--hint-text); font-size: 17px; font-weight: 500; margin-top: 20px; display: none; }
.actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
.complete-box { background: var(--success-bg); border: 2px solid var(--success-border); border-radius: 16px; padding: 32px; text-align: center; display: none; }
.complete-box h2 { font-size: 26px; font-weight: 800; color: var(--success); margin-bottom: 12px; }
.complete-box p { font-size: 18px; color: #166534; font-weight: 500; }
footer { background: var(--primary); color: #a5b4fc; text-align: center; padding: 18px; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-top: auto; }
</style>
</head>
<body>
<header>
    <div class="lesson-tag">Lesson 2 — Dojo Challenge</div>
    <h1>Variables</h1>
</header>
<main>
    <div class="instruction">
        Each snippet has one error. Click the line that is wrong.
    </div>
    <div class="progress">
        <div class="dot current" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <span class="question-label" id="q-label">Snippet 1 of 3</span>
    </div>
    <div id="question-area"></div>
    <div class="complete-box" id="complete-box">
        <h2>All three done!</h2>
        <p>You can spot variable errors. Well done.</p>
    </div>
</main>
<footer>Coding and Programming</footer>
<script>
const snippets = [
    {
        lines: [
            'def on_gesture_shake():',
            '    "answer" = "Definitely yes"',
            '    basic.show_string(answer)'
        ],
        broken: 1,
        explanation: 'Variable names never go in quotes. "answer" in quotes is not a valid variable name — remove the quotes so it reads: answer = "Definitely yes"'
    },
    {
        lines: [
            'def on_gesture_shake():',
            '    answer = Definitely yes',
            '    basic.show_string(answer)'
        ],
        broken: 1,
        explanation: 'Text values must be in quotes. Without them Python does not know it is text — it should read: answer = "Definitely yes"'
    },
    {
        lines: [
            'def on_gesture_shake():',
            '    answer = "Definitely yes"',
            '    basic.show_string("answer")'
        ],
        broken: 2,
        explanation: 'Putting "answer" in quotes displays the word answer literally. Without quotes Python reads the variable and shows its value — it should read: basic.show_string(answer)'
    }
];

let current = 0;
let solved = false;

function renderSnippet() {
    solved = false;
    const s = snippets[current];
    let linesHtml = s.lines.map((line, i) =>
        `<div class="code-line clickable" data-idx="${i}">
            <span class="line-num">${i + 1}</span>
            <span class="line-content">${escHtml(line)}</span>
        </div>`
    ).join('');

    document.getElementById('question-area').innerHTML = `
        <p class="click-label">Click the line with the error:</p>
        <div class="code-block" id="code-block">${linesHtml}</div>
        <div class="feedback-box feedback-correct" id="fb-correct"></div>
        <div class="feedback-box feedback-wrong" id="fb-wrong">That line is OK — look again.</div>
        <div class="actions">
            <button class="btn btn-next" id="btn-next" onclick="nextSnippet()">${current < snippets.length - 1 ? 'Next snippet' : 'Finish'}</button>
            <button class="btn btn-hint" onclick="toggleHint()">Show hint</button>
        </div>
        <div class="hint-box" id="hint">Look carefully at what has quotes around it and what does not. Is that correct?</div>
    `;

    document.getElementById('code-block').addEventListener('click', function(e) {
        if (solved) return;
        const line = e.target.closest('.code-line');
        if (!line) return;
        const idx = parseInt(line.dataset.idx);
        if (idx === s.broken) {
            solved = true;
            line.classList.remove('clickable');
            line.classList.add('clicked-correct');
            const fb = document.getElementById('fb-correct');
            fb.textContent = 'Correct. ' + s.explanation;
            fb.style.display = 'block';
            document.getElementById('fb-wrong').style.display = 'none';
            document.getElementById('btn-next').style.display = 'inline-flex';
            markDot(current, 'done');
        } else {
            line.classList.add('clicked-wrong');
            document.getElementById('fb-wrong').style.display = 'block';
            setTimeout(() => {
                line.classList.remove('clicked-wrong');
                document.getElementById('fb-wrong').style.display = 'none';
            }, 1200);
        }
    });

    document.getElementById('q-label').textContent = 'Snippet ' + (current + 1) + ' of ' + snippets.length;
}

function nextSnippet() {
    current++;
    if (current >= snippets.length) {
        document.getElementById('question-area').style.display = 'none';
        document.getElementById('complete-box').style.display = 'block';
    } else {
        renderSnippet();
    }
}

function markDot(idx, state) {
    document.getElementById('dot-' + idx).className = 'dot ' + state;
    if (idx + 1 < 3) document.getElementById('dot-' + (idx + 1)).className = 'dot current';
}

function toggleHint() {
    const hint = document.getElementById('hint');
    const btn = document.querySelector('.btn-hint');
    const showing = hint.style.display === 'block';
    hint.style.display = showing ? 'none' : 'block';
    btn.textContent = showing ? 'Show hint' : 'Hide hint';
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderSnippet();
</script>
</body>
</html>
